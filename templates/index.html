<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Signage — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #4f8ef7;
      --accent-hover: #3a7ae8;
      --danger: #e05252;
      --danger-hover: #c83c3c;
      --text: #e2e4ed;
      --muted: #8b8fa8;
      --radius: 6px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
    }

    h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: 0.02em; }
    h2 { font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.75rem; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    a.display-link {
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      transition: background 0.15s;
    }
    a.display-link:hover { background: var(--accent); color: #fff; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    /* Upload drop zone */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }
    #drop-zone.drag-over { border-color: var(--accent); background: rgba(79,142,247,0.07); color: var(--text); }
    #drop-zone p { margin-top: 0.4rem; font-size: 0.78rem; }

    #file-input { display: none; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      border: none;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger  { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 0.3rem 0.6rem; }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.78rem; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); color: var(--text); }

    #upload-progress { margin-top: 0.6rem; display: none; }
    progress { width: 100%; height: 6px; border-radius: 3px; }
    #upload-status { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; }

    /* Global delay */
    .setting-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    label { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
    input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 0.35rem 0.6rem;
      width: 80px;
      font-size: 0.85rem;
    }
    input[type="number"]:focus { outline: none; border-color: var(--accent); }

    /* Slide list */
    #slide-list { list-style: none; }
    #slide-list li {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }
    #slide-list li:last-child { border-bottom: none; }

    .thumb {
      width: 80px;
      height: 45px;
      object-fit: cover;
      border-radius: 3px;
      background: var(--bg);
      flex-shrink: 0;
    }

    .slide-info { flex: 1; min-width: 0; }
    .slide-name { font-size: 0.8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .slide-controls { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
    .order-btns { display: flex; flex-direction: column; gap: 2px; }
    .order-btn {
      background: var(--border);
      border: none;
      color: var(--text);
      border-radius: 3px;
      width: 22px;
      height: 18px;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .order-btn:hover { background: var(--accent); }

    .delay-label { font-size: 0.75rem; color: var(--muted); }
    input.delay-input {
      width: 65px;
      font-size: 0.8rem;
      padding: 0.25rem 0.4rem;
    }

    #save-btn-row { margin-top: 1rem; display: flex; justify-content: flex-end; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #222536;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 1.1rem;
      font-size: 0.85rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    .empty-state { color: var(--muted); font-size: 0.85rem; padding: 1rem 0; text-align: center; }
  </style>
</head>
<body>

<header>
  <h1>&#9654; Digital Signage</h1>
  <a class="display-link" href="/display" target="_blank">Open Display &rarr;</a>
</header>

<div class="grid">

  <!-- Left: Upload + Global Delay -->
  <div>
    <div class="card" style="margin-bottom:1.25rem">
      <h2>Upload Media</h2>
      <div id="drop-zone">
        <div style="font-size:1.5rem">&#8593;</div>
        Drop files here or <strong>click to browse</strong>
        <p>Supports: PPTX &middot; PDF &middot; JPG &middot; PNG &middot; GIF &middot; WebP</p>
      </div>
      <input type="file" id="file-input" multiple
             accept=".pptx,.ppt,.pdf,.jpg,.jpeg,.png,.gif,.bmp,.webp">
      <button class="btn btn-primary" id="upload-btn" disabled>Upload</button>
      <div id="upload-progress">
        <progress id="upload-bar" value="0" max="100"></progress>
        <div id="upload-status"></div>
      </div>
    </div>

    <div class="card">
      <h2>Global Delay</h2>
      <div class="setting-row">
        <label for="global-delay">Default seconds per slide</label>
        <input type="number" id="global-delay" min="1" max="3600" value="10">
        <button class="btn btn-primary btn-sm" id="save-global">Save</button>
      </div>
    </div>
  </div>

  <!-- Right: Slide list -->
  <div class="card">
    <h2>Slides</h2>
    <ul id="slide-list">
      <li><div class="empty-state">Loading&hellip;</div></li>
    </ul>
    <div id="save-btn-row">
      <button class="btn btn-primary" id="save-slides">Save Order &amp; Delays</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // -------------------------------------------------------------------------
  // State
  // -------------------------------------------------------------------------
  let config = { global_delay: 10, slides: [] };

  // -------------------------------------------------------------------------
  // Toast
  // -------------------------------------------------------------------------
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = 'toast'; }, 2800);
  }

  // -------------------------------------------------------------------------
  // Load config
  // -------------------------------------------------------------------------
  async function loadConfig() {
    const res = await fetch('/api/config');
    config = await res.json();
    document.getElementById('global-delay').value = config.global_delay;
    renderSlides();
  }

  // -------------------------------------------------------------------------
  // Render slide list
  // -------------------------------------------------------------------------
  function renderSlides() {
    const list = document.getElementById('slide-list');
    const sorted = [...config.slides].sort((a, b) => a.order - b.order);

    if (sorted.length === 0) {
      list.innerHTML = '<li><div class="empty-state">No slides yet. Upload something!</div></li>';
      return;
    }

    list.innerHTML = sorted.map((slide, idx) => `
      <li data-filename="${slide.filename}">
        <img class="thumb" src="/media/${slide.filename}" alt="" loading="lazy">
        <div class="slide-info">
          <div class="slide-name">${slide.filename}</div>
          <div style="margin-top:0.3rem;display:flex;align-items:center;gap:0.4rem">
            <span class="delay-label">Delay (s):</span>
            <input class="delay-input" type="number" min="1" max="3600"
                   placeholder="${config.global_delay}"
                   value="${slide.delay_override !== null ? slide.delay_override : ''}">
            <span class="delay-label" style="font-size:0.7rem;color:#555">(blank = global)</span>
          </div>
        </div>
        <div class="slide-controls">
          <div class="order-btns">
            <button class="order-btn" data-dir="up" title="Move up">&#9650;</button>
            <button class="order-btn" data-dir="down" title="Move down">&#9660;</button>
          </div>
          <button class="btn btn-danger btn-sm" data-delete="${slide.filename}" title="Delete">&#10005;</button>
        </div>
      </li>
    `).join('');

    // Attach move handlers
    list.querySelectorAll('.order-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        const li = btn.closest('li');
        const fname = li.dataset.filename;
        const dir = btn.dataset.dir;
        moveSlide(fname, dir);
      });
    });

    // Attach delete handlers
    list.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', async e => {
        const fname = btn.dataset.delete;
        if (!confirm(`Delete "${fname}"?`)) return;
        await deleteSlide(fname);
      });
    });
  }

  // -------------------------------------------------------------------------
  // Move slide up / down
  // -------------------------------------------------------------------------
  function moveSlide(filename, dir) {
    const sorted = [...config.slides].sort((a, b) => a.order - b.order);
    const idx = sorted.findIndex(s => s.filename === filename);
    const swapIdx = dir === 'up' ? idx - 1 : idx + 1;
    if (swapIdx < 0 || swapIdx >= sorted.length) return;

    const tmp = sorted[idx].order;
    sorted[idx].order = sorted[swapIdx].order;
    sorted[swapIdx].order = tmp;

    config.slides = sorted;
    renderSlides();
  }

  // -------------------------------------------------------------------------
  // Delete slide
  // -------------------------------------------------------------------------
  async function deleteSlide(filename) {
    const res = await fetch(`/api/slide/${encodeURIComponent(filename)}`, { method: 'DELETE' });
    if (res.ok) {
      config.slides = config.slides.filter(s => s.filename !== filename);
      // Re-number
      [...config.slides].sort((a,b) => a.order - b.order).forEach((s,i) => s.order = i+1);
      renderSlides();
      showToast('Slide deleted.');
    } else {
      showToast('Delete failed.', true);
    }
  }

  // -------------------------------------------------------------------------
  // Save slides (order + delay overrides)
  // -------------------------------------------------------------------------
  document.getElementById('save-slides').addEventListener('click', async () => {
    const list = document.getElementById('slide-list');
    const items = list.querySelectorAll('li[data-filename]');

    // Read current delay overrides from DOM
    items.forEach(li => {
      const fname = li.dataset.filename;
      const slide = config.slides.find(s => s.filename === fname);
      if (!slide) return;
      const val = li.querySelector('.delay-input').value.trim();
      slide.delay_override = val !== '' ? parseInt(val, 10) : null;
    });

    const res = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config),
    });

    if (res.ok) showToast('Saved!');
    else showToast('Save failed.', true);
  });

  // -------------------------------------------------------------------------
  // Save global delay
  // -------------------------------------------------------------------------
  document.getElementById('save-global').addEventListener('click', async () => {
    config.global_delay = parseInt(document.getElementById('global-delay').value, 10) || 10;
    const res = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config),
    });
    if (res.ok) showToast('Global delay saved!');
    else showToast('Save failed.', true);
  });

  // -------------------------------------------------------------------------
  // Upload
  // -------------------------------------------------------------------------
  const dropZone  = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const uploadBtn = document.getElementById('upload-btn');
  let selectedFiles = [];

  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    setFiles(Array.from(e.dataTransfer.files));
  });

  fileInput.addEventListener('change', () => setFiles(Array.from(fileInput.files)));

  function setFiles(files) {
    selectedFiles = files;
    uploadBtn.disabled = files.length === 0;
    dropZone.querySelector('strong').textContent =
      files.length ? files.map(f => f.name).join(', ') : 'click to browse';
  }

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFiles.length) return;
    uploadBtn.disabled = true;

    const progressWrap = document.getElementById('upload-progress');
    const bar    = document.getElementById('upload-bar');
    const status = document.getElementById('upload-status');
    progressWrap.style.display = 'block';

    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      status.textContent = `Uploading ${i + 1}/${selectedFiles.length}: ${file.name}…`;
      bar.value = Math.round((i / selectedFiles.length) * 100);

      const fd = new FormData();
      fd.append('file', file);

      try {
        const res = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Upload error');
      } catch (err) {
        showToast(`Error: ${err.message}`, true);
      }
    }

    bar.value = 100;
    status.textContent = 'Done!';
    setTimeout(() => { progressWrap.style.display = 'none'; bar.value = 0; }, 2000);

    selectedFiles = [];
    fileInput.value = '';
    uploadBtn.disabled = true;
    dropZone.querySelector('strong').textContent = 'click to browse';

    await loadConfig();
    showToast('Upload complete.');
  });

  // -------------------------------------------------------------------------
  // Init
  // -------------------------------------------------------------------------
  loadConfig();
</script>
</body>
</html>
